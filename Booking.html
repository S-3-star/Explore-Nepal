<!-- Booking Form -->

<div class="container">

<div class="booking-container mx-auto" style="max-width:600px;">

<h2 class="text-center text-primary mb-4">
Book Your Trip
</h2>

<form id="bookingForm">


<div class="mb-3">

<label class="form-label">Full Name</label>

<input type="text" id="name" class="form-control" placeholder="Enter your full name">

</div>


<div class="mb-3">

<label class="form-label">Email</label>

<input type="email" id="email" class="form-control" placeholder="Enter your email">

</div>


<div class="mb-3">

<label class="form-label">Destination</label>

<select id="destination" class="form-control">

<option value="">Select destination</option>
<option>Mount Everest</option>
<option>Pokhara</option>
<option>Lumbini</option>
<option>Annapurna</option>
<option>Chitwan National Park</option>

</select>

</div>


<div class="mb-3">

<label class="form-label">Travel Date</label>

<input type="date" id="date" class="form-control">

</div>


<div class="mb-3">

<label class="form-label">Number of People</label>

<input type="number" id="people" class="form-control" placeholder="Enter number of people">

</div>


<button type="submit" class="btn btn-primary w-100">

Book Now

</button>


</form>

</div>

</div>


<!-- Footer -->

<footer class="footer">

© 2025 Explore Nepal | All Rights Reserved

</footer>


<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<!-- JavaScript Validation -->

<script>

document.addEventListener("DOMContentLoaded", function(){

const form = document.getElementById("bookingForm");

form.addEventListener("submit", function(event){

event.preventDefault();

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let destination = document.getElementById("destination").value;
let date = document.getElementById("date").value;
let people = document.getElementById("people").value;

let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;


// Validation

if(name === ""){

alert("Please enter your name");
return;

}

if(!email.match(emailPattern)){

alert("Please enter valid email");
return;

}

if(destination === ""){

alert("Please select destination");
return;

}

if(date === ""){

alert("Please select travel date");
return;

}

if(people === "" || people <= 0){

alert("Please enter valid number of people");
return;

}


// Success

alert("Booking Successful! We will contact you soon.");

form.reset();

});

});

</script>
