<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact – Explore Nepal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(to right, #0d3c58, #90caf9);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        margin: 0;
        color: #0d47a1;
      }
      .footer {
        background-color: #0d47a1;
        color: white;
        text-align: center;
        padding: 15px 0;
        margin-top: auto;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-dark"
      style="background-color: #0d3c58"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Explore Nepal</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="index.html">HOME</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="Services.html">SERVICES</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="About Us.html">ABOUT US</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="Contact.html">CONTACT</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main
      class="container my-5 p-4 bg-white rounded shadow-sm"
      style="max-width: 600px"
    >
      <h2 class="text-center text-primary mb-4">Contact Us</h2>
      <form id="contactForm">
        <div class="mb-3">
          <label for="name" class="form-label fw-semibold">Name</label>
          <input
            type="text"
            id="name"
            class="form-control"
            placeholder="Your full name"
            required
          />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label fw-semibold">Email</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="Your email address"
            required
          />
        </div>
        <div class="mb-3">
          <label for="message" class="form-label fw-semibold">Message</label>
          <textarea
            id="message"
            rows="5"
            class="form-control"
            placeholder="Write your message here..."
            required
          ></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          Send Message
        </button>
      </form>
    </main>

    <footer class="footer text-center py-4">
      <h5>Explore Nepal</h5>
      <p>Discover the Heart of the Himalayas</p>
      <p>© 2025 All Rights Reserved</p>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const form = document.getElementById("contactForm");

  form.addEventListener("submit", function (event) {

    event.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let message = document.getElementById("message").value.trim();

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if (name === "") {
      alert("Please enter your name");
      return;
    }

    if (!email.match(emailPattern)) {
      alert("Please enter a valid email");
      return;
    }

    if (message.length < 10) {
      alert("Message must be at least 20 characters");
      return;
    }

    alert("Message sent successfully!");

    form.reset();

  });

});
</script>

  </body>
</html>
